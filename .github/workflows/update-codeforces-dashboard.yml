name: Update Codeforces dashboard

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Codeforces data
        env:
          CODEFORCES_HANDLE: ${{ vars.CODEFORCES_HANDLE }}
          CF_TIMEZONE: ${{ vars.CF_TIMEZONE || 'Asia/Amman' }}
        run: python main.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codeforces_daily_solved.json codeforces_dashboard_data.json
          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
          else
            git commit -m "Update Codeforces solved data"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
